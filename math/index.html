<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numérixa | Bataille de la Forêt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Audiowide&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00ff41;
            --secondary: #ff006e;
            --accent: #00d4ff;
            --dark: #0a0e27;
            --dark-light: #1a1f3a;
            --gold: #ffd700;
            --danger: #ff0055;
            --success: #00ff41;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            color: var(--primary);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Effet de scan de fond */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 65, 0.03) 0px,
                    rgba(0, 255, 65, 0.03) 1px,
                    transparent 1px,
                    transparent 2px
                );
            pointer-events: none;
            animation: scanlines 8s linear infinite;
            z-index: 1;
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        /* Menu d'accueil */
        #menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.95), rgba(22, 33, 62, 0.95));
            z-index: 100;
            animation: fadeIn 0.8s ease-out;
            text-align: center;
        }

        #menu h1 {
            font-family: 'Audiowide', cursive;
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary), 0 0 40px var(--secondary);
            letter-spacing: 3px;
            animation: glitchAnimation 0.3s infinite;
        }

        @keyframes glitchAnimation {
            0% { text-shadow: 0 0 20px var(--primary), 0 0 40px var(--secondary); }
            50% { text-shadow: 0 0 30px var(--primary), 0 0 60px var(--accent); }
            100% { text-shadow: 0 0 20px var(--primary), 0 0 40px var(--secondary); }
        }

        #menu p {
            font-size: 1.3rem;
            color: var(--accent);
            margin-bottom: 40px;
            letter-spacing: 2px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        #menu button {
            padding: 18px 50px;
            font-size: 1.3rem;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: var(--dark);
            border: 3px solid var(--primary);
            border-radius: 0;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.4s both;
            text-transform: uppercase;
        }

        #menu button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.3s ease;
        }

        #menu button:hover {
            box-shadow: 0 0 30px var(--primary), inset 0 0 20px rgba(0, 255, 65, 0.3);
            transform: scale(1.05);
        }

        #menu button:hover::before {
            left: 100%;
        }

        /* Jeu */
        #game {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        /* En-tête du jeu */
        #game-header {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 50;
        }

        .level-display {
            font-size: 1.8rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
            letter-spacing: 2px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Arena */
        #arena {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0a0e27 0%, #1a1f3a 50%, #16213e 100%);
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 100px 60px 100px 60px;
        }

        /* Joueur et Ennemi */
        .character {
            position: relative;
            width: 200px;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #player {
            animation: slideInLeft 0.6s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        #enemy {
            animation: slideInRight 0.6s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .character-avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            background: radial-gradient(circle at 30% 30%, rgba(0, 255, 65, 0.3), transparent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            margin-bottom: 15px;
            box-shadow: 0 0 30px var(--primary), inset 0 0 20px rgba(0, 255, 65, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Barres de santé */
        .health-container {
            width: 100%;
            margin-bottom: 15px;
        }

        .health-label {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .health-bar {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--primary);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success) 0%, var(--gold) 50%, var(--success) 100%);
            width: 100%;
            transition: width 0.5s ease;
            box-shadow: 0 0 15px var(--success);
        }

        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--dark);
            font-weight: 700;
            font-size: 0.8rem;
            z-index: 2;
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
        }

        #enemy .health-bar {
            width: 200px;
        }

        #player .health-bar {
            width: 200px;
        }

        /* Zone de question */
        #question-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 30;
            animation: questionAppear 0.6s ease-out;
        }

        @keyframes questionAppear {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        #question {
            font-size: 3.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent), 0 0 60px rgba(0, 212, 255, 0.5);
            margin-bottom: 30px;
            letter-spacing: 3px;
            animation: questionPulse 1s ease-in-out infinite;
        }

        @keyframes questionPulse {
            0%, 100% { text-shadow: 0 0 30px var(--accent), 0 0 60px rgba(0, 212, 255, 0.5); }
            50% { text-shadow: 0 0 50px var(--accent), 0 0 80px rgba(0, 212, 255, 0.8); }
        }

        /* Zone de réponse */
        #answer-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #player-answer {
            padding: 12px 20px;
            font-size: 1.5rem;
            font-family: 'Orbitron', monospace;
            width: 150px;
            text-align: center;
            border: 2px solid var(--primary);
            border-radius: 0;
            background: rgba(0, 255, 65, 0.1);
            color: var(--primary);
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        #player-answer:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 20px var(--accent);
        }

        #submit-btn {
            padding: 14px 40px;
            font-size: 1.2rem;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            background: linear-gradient(135deg, var(--success), var(--accent));
            color: var(--dark);
            border: 2px solid var(--success);
            border-radius: 0;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        #submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.3s ease;
        }

        #submit-btn:hover {
            box-shadow: 0 0 30px var(--success), inset 0 0 20px rgba(0, 255, 65, 0.3);
            transform: scale(1.05);
        }

        #submit-btn:hover::before {
            left: 100%;
        }

        #submit-btn:active {
            transform: scale(0.98);
        }

        /* Message feedback */
        #feedback {
            position: absolute;
            top: 250px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: bold;
            min-height: 50px;
            z-index: 40;
            text-shadow: 0 0 20px currentColor;
            animation: feedbackFloat 0.8s ease-out;
        }

        @keyframes feedbackFloat {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(0);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(-30px);
            }
        }

        #feedback.correct {
            color: var(--success);
        }

        #feedback.incorrect {
            color: var(--danger);
        }

        /* Effets de combat */
        .damage-number {
            position: absolute;
            font-size: 2.5rem;
            font-weight: bold;
            pointer-events: none;
            animation: damageFloat 1s ease-out forwards;
        }

        .damage-number.damage {
            color: var(--danger);
            text-shadow: 0 0 15px var(--danger);
        }

        .damage-number.heal {
            color: var(--success);
            text-shadow: 0 0 15px var(--success);
        }

        @keyframes damageFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(0.5);
            }
        }

        /* Effet de hit */
        .hit-effect {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            pointer-events: none;
            animation: hitExpand 0.6s ease-out forwards;
        }

        .hit-effect.hit {
            border: 3px solid var(--danger);
            box-shadow: 0 0 30px var(--danger);
        }

        .hit-effect.heal {
            border: 3px solid var(--success);
            box-shadow: 0 0 30px var(--success);
        }

        @keyframes hitExpand {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Game Over */
        #game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.6s ease-out;
        }

        #game-over.show {
            display: flex;
        }

        #game-over h2 {
            font-size: 3.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 30px currentColor;
            animation: glitchAnimation 0.3s infinite;
        }

        #game-over.victory h2 {
            color: var(--success);
        }

        #game-over.defeat h2 {
            color: var(--danger);
        }

        #game-over-stats {
            font-size: 1.5rem;
            margin-bottom: 40px;
            color: var(--accent);
            text-align: center;
            line-height: 2;
        }

        #game-over-buttons {
            display: flex;
            gap: 20px;
        }

        #game-over-buttons button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            background: var(--primary);
            color: var(--dark);
            border: 2px solid var(--primary);
            border-radius: 0;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        #game-over-buttons button:hover {
            box-shadow: 0 0 30px var(--primary);
            transform: scale(1.05);
        }

        /* Animations et transitions */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            #menu h1 {
                font-size: 2.5rem;
            }

            #question {
                font-size: 2.5rem;
            }

            #arena {
                padding: 80px 30px;
            }

            .character {
                width: 150px;
            }

            .character-avatar {
                width: 120px;
                height: 120px;
                font-size: 3rem;
            }
        }

        @media (max-width: 768px) {
            #menu h1 {
                font-size: 2rem;
            }

            #question {
                font-size: 1.8rem;
            }

            #arena {
                padding: 60px 20px;
            }

            .character {
                width: 120px;
            }

            .character-avatar {
                width: 100px;
                height: 100px;
                font-size: 2.5rem;
            }

            .health-bar {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- Menu d'accueil -->
    <div id="menu">
        <h1>NUMÉRIXA</h1>
        <p>⚔️ BATAILLE DE LA FORÊT ⚔️</p>
        <button onclick="startGame()">COMMENCER L'AVENTURE</button>
    </div>

    <!-- Jeu -->
    <div id="game">
        <!-- En-tête -->
        <div id="game-header">
            <div class="level-display">NIVEAU: <span id="level-number">1</span></div>
            <div class="level-display">VAGUES: <span id="waves-number">1</span></div>
        </div>

        <!-- Arena -->
        <div id="arena">
            <!-- Joueur -->
            <div id="player" class="character">
                <div class="character-avatar">🧙‍♂️</div>
                <div class="health-container">
                    <div class="health-label">TON ÉNERGIE</div>
                    <div class="health-bar">
                        <div class="health-fill" id="player-health-fill"></div>
                        <div class="health-text" id="player-health-text">100%</div>
                    </div>
                </div>
            </div>

            <!-- Zone de question -->
            <div id="question-zone">
                <div id="question">0 + 0 = ?</div>
                <div id="answer-zone">
                    <input type="number" id="player-answer" placeholder="Réponse" />
                    <button id="submit-btn" onclick="submitAnswer()">VALIDER</button>
                </div>
                <div id="feedback"></div>
            </div>

            <!-- Ennemi -->
            <div id="enemy" class="character">
                <div class="character-avatar">🐉</div>
                <div class="health-container">
                    <div class="health-label">SANTÉ ENNEMI</div>
                    <div class="health-bar">
                        <div class="health-fill" id="enemy-health-fill"></div>
                        <div class="health-text" id="enemy-health-text">100%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over -->
    <div id="game-over">
        <h2 id="game-over-title">VICTOIRE!</h2>
        <div id="game-over-stats"></div>
        <div id="game-over-buttons">
            <button onclick="nextLevel()">NIVEAU SUIVANT ➡️</button>
            <button onclick="backToMenu()">RETOUR AU MENU</button>
        </div>
    </div>

    <script>
        let playerHealth = 100;
        let enemyHealth = 100;
        let correctAnswer;
        let currentQuestion;
        let level = 1;
        let waves = 1;
        let gameActive = false;

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            gameActive = true;
            initGame();
        }

        function initGame() {
            playerHealth = 100;
            enemyHealth = 100 + (level * 10);
            waves = 1;
            updateUI();
            generateQuestion();
            document.getElementById('player-answer').focus();
        }

        function generateQuestion() {
            const difficulty = Math.min(3, Math.floor(level / 2) + 1);
            const num1 = Math.floor(Math.random() * (10 * difficulty)) + 1;
            const num2 = Math.floor(Math.random() * (10 * difficulty)) + 1;
            
            const operators = ['+', '-', '×'];
            const operator = operators[Math.floor(Math.random() * operators.length)];
            
            let answer;
            if (operator === '+') {
                answer = num1 + num2;
            } else if (operator === '-') {
                answer = num1 - num2;
            } else {
                answer = num1 * num2;
            }

            currentQuestion = `${num1} ${operator} ${num2}`;
            correctAnswer = answer;
            document.getElementById('question').textContent = currentQuestion + ' = ?';
        }

        function updateUI() {
            const playerPercent = Math.max(0, playerHealth);
            const enemyPercent = Math.max(0, enemyHealth);
            
            document.getElementById('player-health-fill').style.width = playerPercent + '%';
            document.getElementById('player-health-text').textContent = playerPercent + '%';
            
            document.getElementById('enemy-health-fill').style.width = enemyPercent + '%';
            document.getElementById('enemy-health-text').textContent = enemyPercent + '%';
            
            document.getElementById('level-number').textContent = level;
            document.getElementById('waves-number').textContent = waves;
        }

        function submitAnswer() {
            if (!gameActive) return;
            
            const playerAnswer = parseInt(document.getElementById('player-answer').value);

            if (isNaN(playerAnswer)) {
                showFeedback('Nombre invalide!', 'incorrect');
                return;
            }

            gameActive = false;

            const feedback = document.getElementById('feedback');
            
            if (playerAnswer === correctAnswer) {
                showFeedback('✓ CORRECT!', 'correct');
                enemyHealth -= 20;
                createDamageNumber('enemy', 20, 'damage');
                createHitEffect('enemy', 'hit');
            } else {
                showFeedback('✗ INCORRECT!', 'incorrect');
                playerHealth -= 15;
                createDamageNumber('player', 15, 'damage');
                createHitEffect('player', 'hit');
            }

            updateUI();
            document.getElementById('player-answer').value = '';

            setTimeout(() => {
                if (enemyHealth <= 0) {
                    endWave(true);
                } else if (playerHealth <= 0) {
                    endGame(false);
                } else {
                    generateQuestion();
                    gameActive = true;
                    document.getElementById('player-answer').focus();
                }
            }, 1000);
        }

        function endWave(victory) {
            if (victory) {
                waves++;
                enemyHealth = 100 + (level * 10);
                playerHealth = Math.min(100, playerHealth + 20);
                updateUI();
                generateQuestion();
                gameActive = true;
                document.getElementById('player-answer').focus();
            }
        }

        function endGame(victory) {
            gameActive = false;
            const gameOverDiv = document.getElementById('game-over');
            const title = document.getElementById('game-over-title');
            const stats = document.getElementById('game-over-stats');

            if (victory) {
                gameOverDiv.classList.add('victory');
                gameOverDiv.classList.remove('defeat');
                title.textContent = '🎉 VICTOIRE! 🎉';
                stats.innerHTML = `
                    <p>Niveau: ${level}</p>
                    <p>Vagues vaincues: ${waves - 1}</p>
                    <p>Énérgie restante: ${playerHealth}%</p>
                `;
            } else {
                gameOverDiv.classList.add('defeat');
                gameOverDiv.classList.remove('victory');
                title.textContent = '💀 DÉFAITE 💀';
                stats.innerHTML = `
                    <p>Niveau atteint: ${level}</p>
                    <p>Vagues: ${waves}</p>
                    <p>Vous avez combattu vaillamment!</p>
                `;
            }

            gameOverDiv.classList.add('show');
        }

        function nextLevel() {
            level++;
            document.getElementById('game-over').classList.remove('show');
            initGame();
        }

        function backToMenu() {
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('game').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            level = 1;
            gameActive = false;
        }

        function showFeedback(text, type) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = text;
            feedback.className = type;
        }

        function createDamageNumber(target, damage, type) {
            const element = document.getElementById(target);
            const number = document.createElement('div');
            number.className = 'damage-number ' + type;
            number.textContent = type === 'damage' ? '-' + damage : '+' + damage;
            
            const rect = element.getBoundingClientRect();
            number.style.left = (rect.left + rect.width / 2) + 'px';
            number.style.top = (rect.top + rect.height / 2) + 'px';
            
            document.getElementById('arena').appendChild(number);
            
            setTimeout(() => number.remove(), 1000);
        }

        function createHitEffect(target, type) {
            const element = document.getElementById(target);
            const effect = document.createElement('div');
            effect.className = 'hit-effect ' + type;
            
            const rect = element.getBoundingClientRect();
            effect.style.left = (rect.left + rect.width / 2 - 150) + 'px';
            effect.style.top = (rect.top + rect.height / 2 - 150) + 'px';
            
            document.getElementById('arena').appendChild(effect);
            
            setTimeout(() => effect.remove(), 600);
        }

        // Gestion du clavier
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && gameActive && document.getElementById('game').style.display !== 'none') {
                submitAnswer();
            }
        });

        // Génération initiale
        window.addEventListener('load', () => {
            // Le jeu attend que le joueur clique sur Commencer
        });
    </script>
</body>
</html>
